<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rudy's Bar</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="hero">
    <h1>🍸 RUDY'S BAR</h1>
    <p>La mejor experiencia nocturna en la ciudad</p>
  </header>

  <section class="menu">

    <h2>🥂 Bebidas</h2>

    <div class="grid">

      <div class="card">
        <h3>Mojito</h3>
        <p>Ron, hierbabuena, limón</p>
        <strong>$25.000</strong>
      </div>

      <div class="card">
        <h3>Gin Tonic</h3>
        <p>Ginebra premium + tónica</p>
        <strong>$30.000</strong>
      </div>

      <div class="card">
        <h3>Tequila Sunrise</h3>
        <p>Tequila, naranja, granadina</p>
        <strong>$28.000</strong>
      </div>

    </div>

  </section>

  <footer>
    <p>📍 Cali, Colombia | Abierto 6pm - 4am</p>
  </footer>

  <button onclick="cambiarModo()">🌙 Modo Neón</button>

</body>
</html>
